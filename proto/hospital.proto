syntax = "proto3";

package hospital;

option go_package = "hospital/generated/proto";

message Empty {}

message Clinic {
	int64 id = 1;
	string name = 2;
}

message ListClinicsResponse {
	repeated Clinic clinics = 1;
}

message Doctor {
	int64 id = 1;
	string name = 2;
	string specialization = 3;
}

message CreateDoctorRequest {
	string name = 1;
	string specialization = 2;
}

message ListDoctorsResponse {
	repeated Doctor doctors = 1;
}

message LinkDoctorRequest {
	int64 clinic_id = 1;
	int64 doctor_id = 2;
}

message ListClinicDoctorsRequest {
	int64 clinic_id = 1;
}

message Patient {
	int64 id = 1;
	string name = 2;
	int32 age = 3;
}

message CreatePatientRequest {
	string name = 1;
	int32 age = 2;
}

message ListPatientsResponse {
	repeated Patient patients = 1;
}

message ListClinicPatientsRequest {
	int64 clinic_id = 1;
}

message SearchDoctorsRequest {
	string query = 1;
	int64 clinic_id = 2;
}

message SearchPatientsRequest {
	string query = 1;
}

message Appointment {
	int64 id = 1;
	int64 clinic_id = 2;
	int64 doctor_id = 3;
	int64 patient_id = 4;
	string scheduled_at = 5;
	string status = 6;
}

message ScheduleAppointmentRequest {
	int64 clinic_id = 1;
	int64 doctor_id = 2;
	int64 patient_id = 3;
	string scheduled_at = 4;
}

message ListAppointmentsRequest {
	int64 clinic_id = 1;
	int64 doctor_id = 2;
	int64 patient_id = 3;
	string date = 4;
}

message ListAppointmentsResponse {
	repeated Appointment appointments = 1;
}

message UpdateAppointmentStatusRequest {
	int64 id = 1;
	string status = 2;
}

message Consultation {
	string id = 1;
	int64 appointment_id = 2;
	int64 doctor_id = 3;
	int64 patient_id = 4;
	int64 clinic_id = 5;
	string symptoms = 6;
	string prescription = 7;
	string notes = 8;
	string created_at = 9;
	string updated_at = 10;
}

message SaveConsultationRequest {
	int64 appointment_id = 1;
	int64 doctor_id = 2;
	int64 patient_id = 3;
	int64 clinic_id = 4;
	string symptoms = 5;
	string prescription = 6;
	string notes = 7;
}

message GetConsultationRequest {
	int64 appointment_id = 1;
}

service HospitalService {
	rpc ListClinics(Empty) returns (ListClinicsResponse);
	rpc CreatePatient(CreatePatientRequest) returns (Patient);
	rpc CreateDoctor(CreateDoctorRequest) returns (Doctor);
	rpc LinkDoctorToClinic(LinkDoctorRequest) returns (Empty);
	rpc ListClinicDoctors(ListClinicDoctorsRequest) returns (ListDoctorsResponse);
	rpc ListClinicPatients(ListClinicPatientsRequest) returns (ListPatientsResponse);
	rpc ScheduleAppointment(ScheduleAppointmentRequest) returns (Appointment);
	rpc ListAppointments(ListAppointmentsRequest) returns (ListAppointmentsResponse);
	rpc SearchDoctors(SearchDoctorsRequest) returns (ListDoctorsResponse);
	rpc SearchPatients(SearchPatientsRequest) returns (ListPatientsResponse);
	rpc UpdateAppointmentStatus(UpdateAppointmentStatusRequest) returns (Appointment);
	rpc SaveConsultation(SaveConsultationRequest) returns (Consultation);
	rpc GetConsultation(GetConsultationRequest) returns (Consultation);
}